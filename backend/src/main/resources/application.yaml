spring:
  application:
    name: sistema-mei

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

  jpa:
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:update}

    show-sql: true

    properties:
      hibernate:
        format_sql: true

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            scope: profile, email

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

server:
  port: ${PORT:8080}

api:
  security:
    token:
      secret: ${JWT_SECRET}
  cors:
    origem: ${CORS_ORIGIN:http://localhost:5173}

frontend:
  url: ${FRONTEND_URL:${CORS_ORIGIN:http://localhost:5173}}

auth:
  refresh-cookie:
    secure: ${AUTH_REFRESH_COOKIE_SECURE:false}
    same-site: ${AUTH_REFRESH_COOKIE_SAME_SITE:Lax}
    path: ${AUTH_REFRESH_COOKIE_PATH:/auth}
    max-age-days: ${AUTH_REFRESH_COOKIE_MAX_AGE_DAYS:30}
    domain: ${AUTH_REFRESH_COOKIE_DOMAIN:}
