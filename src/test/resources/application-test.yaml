spring:
  datasource:
    url: jdbc:h2:mem:sistemamei_test;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver

  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        format_sql: false

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: test-google-client-id
            client-secret: test-google-client-secret
            scope: profile, email

  devtools:
    restart:
      enabled: false

api:
  cors:
    origem: http://localhost:5173

frontend:
  url: http://localhost:5173

JWT_SECRET: test-jwt-secret
